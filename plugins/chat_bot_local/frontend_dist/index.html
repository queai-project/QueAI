<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Chat UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div id="root" class="w-full max-w-2xl"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [input, setInput] = useState("");
            const [messages, setMessages] = useState([]);
            const [loading, setLoading] = useState(false);
            const [config, setConfig] = useState(null); // Estado para guardar /health
            const scrollRef = useRef(null);

            // 1. Obtener datos de salud al cargar
            useEffect(() => {
                fetchHealth();
            }, []);

            const fetchHealth = async () => {
                try {
                    const response = await fetch('/api/chatbot_local/health');
                    const data = await response.json();
                    setConfig(data);
                } catch (e) {
                    console.error("Error obteniendo health:", e);
                    setConfig({ status: "error" });
                }
            };

            // Auto-scroll
            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                }
            }, [messages, loading]);

            const sendMessage = async () => {
                if (!input.trim() || loading) return;

                const userMessage = input;
                setMessages(prev => [...prev, { role: 'user', text: userMessage }]);
                setInput("");
                setLoading(true);

                try {
                    const response = await fetch(`/api/chatbot_local/message?message=${encodeURIComponent(userMessage)}`, {
                        method: 'POST'
                    });

                    if (!response.ok) throw new Error("Error en el servidor");
                    const data = await response.json();
                    setMessages(prev => [...prev, { role: 'bot', text: data.response }]);
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'bot', text: "❌ Error: No se pudo conectar con Ollama." }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col h-[650px] border border-gray-200">
                    {/* Header Principal */}
                    <div className="bg-indigo-600 p-4 shadow-md text-white">
                        <div className="flex justify-between items-center">
                            <h2 className="font-bold text-lg flex items-center">
                                <span className={`w-3 h-3 rounded-full mr-2 ${config?.status === 'healthy' ? 'bg-green-400 animate-pulse' : 'bg-red-500'}`}></span>
                                Ollama Assistant
                            </h2>
                            <span className="text-xs bg-indigo-800 px-2 py-1 rounded">
                                v3.0 Flash AI
                            </span>
                        </div>

                        {/* Barra de Datos de /health */}
                        {config && (
                            <div className="mt-3 grid grid-cols-3 gap-2 text-[10px] uppercase tracking-wider bg-indigo-700/50 p-2 rounded-lg border border-indigo-400/30">
                                <div className="border-r border-indigo-400/30">
                                    <p className="text-indigo-200">Modelo</p>
                                    <p className="font-mono font-bold truncate">{config.model || "???"}</p>
                                </div>
                                <div className="border-r border-indigo-400/30 px-2">
                                    <p className="text-indigo-200">Servidor</p>
                                    <p className="font-mono font-bold truncate">{config.serve || "Localhost"}</p>
                                </div>
                                <div className="px-2">
                                    <p className="text-indigo-200">Temp</p>
                                    <p className="font-mono font-bold">{config.temperature ?? "0.0"}</p>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Chat Box */}
                    <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50">
                        {messages.length === 0 && (
                            <div className="text-center text-gray-400 mt-10">
                                <p className="text-4xl mb-2">🚀</p>
                                <p>Listo para procesar con <b>{config?.model || 'IA'}</b></p>
                                <p className="text-xs">Escribe un mensaje abajo.</p>
                            </div>
                        )}
                        {messages.map((msg, i) => (
                            <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[85%] p-3 rounded-2xl shadow-sm ${
                                    msg.role === 'user' 
                                    ? 'bg-indigo-500 text-white rounded-tr-none' 
                                    : 'bg-white border border-gray-200 text-gray-800 rounded-tl-none shadow-sm'
                                }`}>
                                    <p className="text-sm whitespace-pre-wrap">{msg.text}</p>
                                </div>
                            </div>
                        ))}
                        {loading && (
                            <div className="flex justify-start">
                                <div className="bg-gray-200 p-3 rounded-2xl rounded-tl-none animate-pulse text-gray-500 text-xs font-bold">
                                    {config?.model || 'Ollama'} está pensando...
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Input Area */}
                    <div className="p-4 border-t bg-white flex gap-2">
                        <input 
                            type="text" 
                            className="flex-1 p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                            placeholder="Enviar mensaje..."
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                            disabled={loading}
                        />
                        <button 
                            onClick={sendMessage}
                            disabled={loading || !input.trim()}
                            className="bg-indigo-600 text-white px-5 py-2 rounded-lg hover:bg-indigo-700 disabled:bg-gray-300 transition-all shadow-md active:scale-95"
                        >
                            {loading ? "..." : "Enviar"}
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
