version: '3.8'

services:
  plugin-demo2:
    build: .
    container_name: plugin2_demo_service
    # QUITAMOS LOS PORTS: - "8002:8000"
    networks:
      - odoo_network
    labels:
      - "traefik.enable=true"
      # Definimos la ruta de entrada para este plugin
      - "traefik.http.routers.plugin-demo2.rule=PathPrefix(`/api/module2`)"
      - "traefik.http.routers.plugin-demo2.entrypoints=web"
      # Le decimos a Traefik en qué puerto interno escucha FastAPI
      - "traefik.http.services.plugin-demo2.loadbalancer.server.port=8000"

networks:
  odoo_network:
    external: true # IMPORTANTE: Le dice que use la red que ya creó el Kernel