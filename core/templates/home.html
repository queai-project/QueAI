<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueAI - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="max-w-6xl mx-auto px-6 py-16">
        <section class="relative overflow-hidden rounded-3xl border border-slate-800 bg-gradient-to-br from-slate-900 via-slate-900 to-indigo-950 p-10 md:p-14 shadow-2xl">
            <div class="absolute -top-20 -right-20 w-72 h-72 rounded-full bg-indigo-500/20 blur-3xl"></div>
            <div class="absolute -bottom-24 -left-24 w-72 h-72 rounded-full bg-cyan-400/10 blur-3xl"></div>

            <div class="relative z-10">
                <p class="inline-flex items-center rounded-full border border-indigo-400/30 bg-indigo-500/10 px-3 py-1 text-xs font-semibold tracking-widest text-indigo-300 uppercase">
                    QueAI Kernel
                </p>
                <h1 class="mt-5 text-4xl md:text-5xl font-black tracking-tight">
                    Centro de Control de Módulos de IA
                </h1>
                <p class="mt-4 max-w-2xl text-slate-300 leading-relaxed">
                    Gestiona instalación, ejecución, configuración y monitoreo de tus módulos desde una sola interfaz.
                </p>

                <div class="mt-8 flex flex-wrap gap-3">
                    <a href="/manager/" class="rounded-xl bg-indigo-600 px-6 py-3 font-bold text-white hover:bg-indigo-500 transition-colors">
                        Ir al App Store
                    </a>
                    <a href="/marketplace/" class="rounded-xl border border-slate-700 bg-slate-900/60 px-6 py-3 font-bold text-slate-200 hover:border-indigo-400 hover:text-indigo-300 transition-colors">
                        Marketplace
                    </a>
                    <a href="/monitor/" class="rounded-xl border border-slate-700 bg-slate-900/60 px-6 py-3 font-bold text-slate-200 hover:border-emerald-400 hover:text-emerald-300 transition-colors">
                        Monitoreo
                    </a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
