name: Plugin proposal
description: Propose adding a new module to the official registry.
title: "[plugin] "
labels: ["plugin-proposal", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        QueAI does not host plugin code in this repo. Each plugin is an
        independent repo; the official registry (`register.json`) only
        keeps the `git_url`.

        Before proposing:
        1. Read [`docs/PLUGIN_DEVELOPMENT.md`](https://github.com/queai-project/QueAI/blob/main/docs/PLUGIN_DEVELOPMENT.md) — it includes two complete examples (local CPU and cloud proxy).
        2. Your repo must be **public** and have a LICENSE compatible with MIT (MIT, Apache-2, BSD-3, ISC).
        3. Your `manifest.json` must be valid and the declared endpoints must respond.

  - type: input
    id: name
    attributes:
      label: Plugin name
      placeholder: "E.g.: chat_cloud_proxy"
    validations:
      required: true

  - type: input
    id: repo
    attributes:
      label: Repo URL
      placeholder: "https://github.com/user/queai-chat-cloud-proxy"
    validations:
      required: true

  - type: textarea
    id: what-it-does
    attributes:
      label: What it does
      description: 2-4 sentences.
    validations:
      required: true

  - type: dropdown
    id: backend-type
    attributes:
      label: Backend type
      options:
        - "Local CPU model"
        - "Local GPU model"
        - "Thin proxy to an external API"
        - "Pipeline (mixed local + external)"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: Host requirements
      description: RAM, CPU/GPU, disk, models to download, outbound connectivity, etc.

  - type: textarea
    id: external-apis
    attributes:
      label: External APIs consumed (if any)
      description: |
        For proxy-type plugins. List the URLs / providers, what secrets
        the operator needs, what stays on the host vs. what travels out.

  - type: checkboxes
    id: checks
    attributes:
      label: Before proposing
      options:
        - label: The repo is public and has an MIT-compatible LICENSE.
          required: true
        - label: There's a valid manifest.json at the root.
          required: true
        - label: The plugin comes up and responds to its healthcheck locally with `docker compose up`.
          required: true
        - label: The README documents requirements, credentials (if applicable) and outbound traffic (if applicable).
          required: true
