name: Feature request
description: A new capability or a behavior change in the kernel.
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening the issue:
        - Review the [Product Vision](https://github.com/queai-project/QueAI/blob/main/docs/PRODUCTVISION.md).
          It may already be planned, or there may be an explicit reason it isn't.
        - If your idea is a new module (not a kernel change),
          use the **Plugin proposal** template.

  - type: textarea
    id: problem
    attributes:
      label: What problem does it solve?
      description: Start with the concrete problem, not the solution.
      placeholder: "Today, when I want to do X, I have to ... This is painful because ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How you think it should work.
      placeholder: "The catalog should have a toggle for ..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "I tried ... but ..."

  - type: dropdown
    id: scope
    attributes:
      label: Where it fits
      options:
        - "Kernel — UI / hub"
        - "Kernel — REST API"
        - "Kernel — queai CLI"
        - "Kernel — installation / deployment"
        - "Kernel — observability (audit, healthcheck, logs)"
        - "Documentation"
        - "Not sure"
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I reviewed the Product Vision and this isn't already proposed there.
          required: true
        - label: My proposal is compatible with the Product Vision (single-user, local+cloud, etc.).
          required: true
