name: Bug report
description: Something behaves differently from the docs or throws an error.
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. The more concrete you are, the faster we can fix it.
        Before opening the issue, please check there isn't a similar one already in
        [open and closed issues](https://github.com/queai-project/QueAI/issues?q=is%3Aissue).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Describe the current behavior.
      placeholder: "E.g.: when clicking Install on the OCR module, the container starts but the catalog still shows it as 'stopped'."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      placeholder: "E.g.: the badge should switch to 'running' within 5s."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: As specific as possible. If a command sequence is needed, paste it as-is.
      placeholder: |
        1. Install QueAI with the command from the README.
        2. Log in with the admin set in .env.
        3. In /marketplace/ click "Download" on OCR.
        4. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        `docker compose logs --tail=200 django-kernel`,
        `queai logs <plugin> -n 200`,
        or whatever applies. Redact any secrets before pasting.
      render: shell

  - type: input
    id: kernel-version
    attributes:
      label: Kernel version
      description: "Output of `queai health` or `curl http://localhost:8473/health`. If neither works, indicate the tag or commit."
      placeholder: "v1.0.0 / commit abc1234"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - "curl queai.dev/install.sh | bash"
        - "git clone + docker compose"
        - "Other (specify below)"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and version
      placeholder: "Ubuntu 24.04 / macOS 15.2 / WSL2 Ubuntu 22.04 / ..."
    validations:
      required: true

  - type: input
    id: docker-version
    attributes:
      label: Docker / Compose version
      description: "`docker --version` and `docker compose version`"
      placeholder: "Docker 27.3 / Compose 2.30"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Non-standard configuration, third-party plugins installed, screenshots, etc.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched for similar issues before opening this one.
          required: true
        - label: I'm on the latest published version (or I say so explicitly above if not).
          required: true
        - label: I didn't include secrets in the pasted logs.
          required: true
