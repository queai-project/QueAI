name: Sync installer to landing

# Cuando install.sh cambia en main, publica una copia idéntica en
# queai-project/queai-project.github.io para que esté disponible en
# https://queai.dev/install.sh (sin tener que tocar Cloudflare ni DNS).

on:
  push:
    branches: [main]
    paths:
      - "install.sh"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kernel
        uses: actions/checkout@v4
        with:
          path: kernel

      - name: Checkout landing
        uses: actions/checkout@v4
        with:
          repository: queai-project/queai-project.github.io
          path: landing
          # Necesita un PAT con scope `contents:write` sobre el repo de la
          # landing porque el GITHUB_TOKEN por defecto solo puede escribir
          # en el repo donde corre el workflow.
          # Si LANDING_SYNC_TOKEN no está configurado, el job falla con un
          # mensaje claro y se puede copiar el archivo a mano.
          token: ${{ secrets.LANDING_SYNC_TOKEN }}

      - name: Copy install.sh
        run: |
          set -e
          cp kernel/install.sh landing/install.sh
          chmod +x landing/install.sh

      - name: Commit & push if changed
        working-directory: landing
        run: |
          set -e
          git config user.name "queai-installer-sync"
          git config user.email "noreply@queai.dev"
          if git diff --quiet -- install.sh; then
            echo "install.sh unchanged in landing — nothing to push."
            exit 0
          fi
          git add install.sh
          git commit -m "chore: sync install.sh from kernel ($GITHUB_SHA)"
          git push
